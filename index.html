<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Manager — Add Account</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo-container">
      <span style="font-size: 1.8rem;">🔑</span> Vought
    </a>
    <div class="header-actions">
      <a href="index.html" style="text-decoration: none;"><button class="btn-round" title="Add Account">+</button></a>
      <a href="students.html" style="text-decoration: none;">
        <button class="btn-pill">Passwords <span id="userEmail" style="font-size: 0.8rem; margin-left:8px; opacity: 0.7;"></span></button>
      </a>
      <button class="btn-pill btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </header>

  <main class="add-account-main">
    <h1 class="page-title">Add New Account</h1>
    <p class="page-subtitle">Securely store your login credentials.</p>

    <div class="card">
      <div class="form-group">
        <label for="name">Account Name (e.g. GitHub)</label>
        <input type="text" id="name" placeholder="Enter site name" />
      </div>
      <div class="form-group">
        <label for="email">Email / Username</label>
        <input type="email" id="email" placeholder="e.g. user@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-icon-wrap">
          <input type="password" id="password" placeholder="••••••••" />
          <button class="toggle-pw" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'" title="Show/Hide">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="">— Select Category —</option>
          <option value="Social">Social</option>
          <option value="Work">Work</option>
          <option value="Finance">Finance</option>
          <option value="Shopping">Shopping</option>
          <option value="Dev Tools">Dev Tools</option>
          <option value="Email">Email</option>
          <option value="Login">Login</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="url">Website URL (optional)</label>
        <input type="url" id="url" placeholder="https://example.com" />
      </div>

      <button class="btn btn-primary" id="submitBtn">Save Account</button>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
