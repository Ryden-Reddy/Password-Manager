<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Manager — Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">

  <div class="auth-wrapper">
    <div class="auth-brand">
      <h1 class="auth-title"><span class="auth-logo" style="display:inline; font-size:2rem;">🔑</span> Vought</h1>
      <p class="auth-tagline">Your personal password vault.</p>
    </div>

    <div class="auth-card">
      <h2 class="auth-heading">Create an account</h2>
      <p class="auth-sub">Start managing your passwords securely.</p>

      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" /></div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrap">
          <input type="password" id="password" placeholder="Min. 6 characters" />
          <button class="toggle-pw" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password'">👁</button>
        </div>
      </div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm" placeholder="Re-enter password" /></div>
      
      <p class="auth-error" id="errorMsg"></p>
      <button class="btn btn-primary" id="signupBtn">Create Account</button>
      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
