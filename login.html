<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Manager — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  
  <div id="loader" class="loader-container">
    <div class="loader-logo"><span style="font-size: 4rem;">🔑</span> Vought</div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-brand">
      <h1 class="auth-title"><span class="auth-logo" style="display:inline; font-size:2rem;">🔑</span> Vought</h1>
      <p class="auth-tagline">Your personal password vault.</p>
    </div>

    <div class="auth-card">
      <h2 class="auth-heading">Welcome back</h2>
      <p class="auth-sub">Sign in to access your passwords.</p>

      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" /></div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrap">
          <input type="password" id="password" placeholder="••••••••" />
          <button class="toggle-pw" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password'">👁</button>
        </div>
      </div>
      <p class="auth-error" id="errorMsg"></p>
      <button class="btn btn-primary" id="loginBtn">Sign In</button>
      <p class="auth-switch">Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
